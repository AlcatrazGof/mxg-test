---
- name: Ensure deploy group exists
  ansible.builtin.group:
    name: "{{ deploy_group }}"
    state: present

- name: Ensure deploy user exists
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    shell: "{{ deploy_shell }}"
    create_home: true
    state: present

- name: Grant passwordless sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ deploy_user }}"
    content: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"

- name: Create SSH directory
  ansible.builtin.file:
    path: "{{ deploy_home }}/.ssh"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0700"
    state: directory

