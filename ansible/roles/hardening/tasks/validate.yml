---
- name: Verify security baseline configuration exists
  ansible.builtin.stat:
    path: /etc/sysctl.d/99-security-baseline.conf
  register: security_baseline

- name: Assert security baseline configuration is present
  ansible.builtin.assert:
    that:
      - security_baseline.stat.exists
    fail_msg: "Security baseline configuration is missing."

- name: Assert supported operating system
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu"
      - ansible_distribution_major_version == "24"
    fail_msg: "Only Ubuntu 24.04 is supported."